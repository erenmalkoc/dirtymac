name: Release

# Build, sign, notarize, and publish a stapled DMG whenever a v*.*.*
# tag is pushed. Bump the version, then:
#
#     git tag v1.0.0 && git push origin v1.0.0
#
# All credentials live in repository Secrets — see README for the
# six values that need to be set.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  release:
    name: Build, notarize, publish
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # GitHub's macos-26 runner names Xcode by exact version (e.g.
        # Xcode_26.0.1.app), so we glob and pick the latest 26.x.
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26.x found. Available Xcodes:"
            ls /Applications/ | grep -i '^Xcode' || true
            exit 1
          fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building dirtymac v$VERSION"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          P12_PATH="$RUNNER_TEMP/cert.p12"

          echo -n "$DEVELOPER_ID_P12_BASE64" | base64 --decode -o "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Explicit -T flags grant codesign/etc unattended access without
          # password prompts, which `-A` doesn't reliably do for keys.
          security import "$P12_PATH" \
              -P "$DEVELOPER_ID_P12_PASSWORD" \
              -k "$KEYCHAIN_PATH" \
              -T /usr/bin/codesign \
              -T /usr/bin/security \
              -T /usr/bin/productbuild \
              -T /usr/bin/productsign

          # Make the build keychain the first in the search path so xcodebuild
          # finds the imported identity, while preserving the default keychains.
          DEFAULTS=$(security list-keychain -d user | sed -E 's/^[[:space:]]+//; s/"//g')
          security list-keychain -d user -s "$KEYCHAIN_PATH" $DEFAULTS

          security set-key-partition-list \
              -S apple-tool:,apple:,codesign: \
              -k "$KEYCHAIN_PASSWORD" \
              "$KEYCHAIN_PATH" >/dev/null

          rm -f "$P12_PATH"

          echo "::group::Codesigning identities in build keychain"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "::endgroup::"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
             | grep -q 'Developer ID Application'; then
            echo "::error::No 'Developer ID Application' identity in the imported .p12."
            echo "Re-export from Keychain Access:"
            echo "  1. Select the 'Developer ID Application: ... (SHZP975U3T)' cert"
            echo "  2. Expand it — the private key MUST be visible underneath"
            echo "  3. Right-click → Export → Personal Information Exchange (.p12)"
            echo "  4. base64 -i devid.p12 | pbcopy, then update the secret"
            exit 1
          fi

      - name: Write notarization key
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
        run: |
          echo -n "$NOTARY_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/notary.p8"

      - name: Build, sign, notarize, package
        env:
          APPLE_TEAM_ID:     ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_PATH:   ${{ runner.temp }}/notary.p8
          NOTARY_KEY_ID:     ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID:  ${{ secrets.NOTARY_ISSUER_ID }}
        run: scripts/release.sh "${{ steps.version.outputs.version }}"

      - name: Show artifacts
        run: ls -lh build/release/

      - name: Read SHA256
        id: sha
        run: |
          SHA=$(awk '{print $1}' "build/release/dirtymac-${{ steps.version.outputs.version }}.sha256")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: dirtymac ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/release/dirtymac-${{ steps.version.outputs.version }}.dmg
          body: |
            ## Install via Homebrew

            ```bash
            brew install --cask erenmalkoc/tap/dirtymac
            ```

            ## SHA256

            ```
            ${{ steps.sha.outputs.sha256 }}
            ```

            ---

            See [CHANGELOG.md](CHANGELOG.md) for details.
